services:
  http-backend:
    build:
      context: .
      dockerfile: apps/http-backend/Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8001:8001"
    networks:
      - app-net

  ws-backend:
    build:
      context: .
      dockerfile: apps/ws-backend/Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8080:8080"
    networks:
      - app-net

  excalidraw-frontend:
    build:
      context: .
      dockerfile: apps/excalidraw-frontend/Dockerfile
      args:
        # NEXT_PUBLIC_* are baked into the JS bundle at build time.
        # These are called FROM THE BROWSER, so they must use localhost
        # (the host machine's ports that Docker exposes).
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8001
        NEXT_PUBLIC_WS_URL: ws://localhost:8080
    environment:
      # SERVER_BACKEND_URL is used by Next.js SSR inside the container.
      # It must use the Docker service name, not localhost.
      SERVER_BACKEND_URL: http://http-backend:8001
    ports:
      - "3000:3000"
    depends_on:
      - http-backend
      - ws-backend
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
